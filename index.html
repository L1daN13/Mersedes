<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercedes-Benz Luxury</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#000;color:#fff;}

nav{
position:fixed;top:0;width:100%;
background:#111;padding:20px 40px;
display:flex;justify-content:space-between;
z-index:100;border-bottom:1px solid #333;
}
nav ul{display:flex;gap:20px;list-style:none;}
nav a{color:#fff;text-decoration:none}

.hero{
height:60vh;margin-top:80px;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
text-align:center;
}

.btn{
padding:12px 25px;background:#fff;color:#000;
text-decoration:none;font-weight:bold;
cursor:pointer;
}

.section{padding:80px 40px;}

.cars-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.car-card{
background:#111;border:1px solid #333;
cursor:pointer;transition:0.3s;
}
.car-card:hover{transform:scale(1.03);}
.car-card img{width:100%;height:180px;object-fit:cover;}

.car-info{padding:15px;}

.modal{
display:none;position:fixed;
inset:0;background:rgba(0,0,0,0.9);
justify-content:center;align-items:center;
}

.modal-content{
background:#161616;padding:25px;
width:90%;max-width:500px;
border:1px solid #444;
}

.close{float:right;cursor:pointer;font-size:25px;}
</style>
</head>

<body>

<nav>
<div><b>MERCEDES</b></div>
<ul>
<li><a href="#">Головна</a></li>
<li><a href="#catalog">Авто</a></li>
</ul>
</nav>

<section class="hero">
<h1>The Best or Nothing</h1>
<p style="color:#aaa">Преміальні автомобілі</p>
<a class="btn" href="#catalog">Дивитись</a>
</section>

<section id="catalog" class="section">
<h2>Каталог</h2><br>

<div class="cars-grid">

<div class="car-card" onclick="openModal('AMG GT','$185 000','Спорт + V8 бітурбо')">
<img src="https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?auto=format&fit=crop&w=800">
<div class="car-info">
<h3>AMG GT</h3>
<p>$185 000</p>
</div>
</div>

<div class="car-card" onclick="openModal('S-Class','$142 000','Комфорт і розкіш')">
<img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a?auto=format&fit=crop&w=800">
<div class="car-info">
<h3>S-Class</h3>
<p>$142 000</p>
</div>
</div>

</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">×</span>
<h2 id="title"></h2>
<p id="price"></p>
<p id="desc"></p>

<br>

<h3>Бронювання</h3>
<form onsubmit="event.preventDefault(); alert('Заброньовано!'); closeModal();">
<input placeholder="Card" maxlength="16" required>
<br><br>
<input placeholder="CVV" maxlength="3" required>
<br><br>
<button class="btn">Pay</button>
</form>

</div>
</div>

<script>
function openModal(t,p,d){
document.getElementById("title").innerText=t;
document.getElementById("price").innerText=p;
document.getElementById("desc").innerText=d;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

window.onclick=(e)=>{
if(e.target.id==="modal") closeModal();
}
</script>

</body>
</html>
